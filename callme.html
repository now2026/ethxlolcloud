<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Your Note ✨</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #1a1a2e;
            color: #f8f8ff;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(26, 26, 46, 0.8);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { color: #f8f8ff; }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            height: 150px;
            margin-bottom: 15px;
            resize: vertical;
            background-color: rgba(0, 0, 0, 0.2);
            color: #f8f8ff;
            font-size: 15px;
        }
        textarea::placeholder { color: rgba(248, 248, 255, 0.7); }
        button {
            background-color: #4a6fa5;
            color: #f8f8ff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #3a5a8f; }
        .privacy-note {
            font-size: 13px;
            opacity: 0.85;
            margin-top: 15px;
            padding: 10px;
            background: rgba(74, 111, 165, 0.15);
            border-radius: 6px;
            border-left: 3px solid #4a6fa5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Send Your Note ✨</h1>
        <p>You can send any note or inquiry here:</p>
        
        <form id="messageForm">
            <textarea id="message" placeholder="Write your note here..." maxlength="1000" required></textarea>
            <br>
            <button type="button" onclick="sendMessage()">📬 Send Securely</button>
        </form>
        
        <div class="privacy-note">
            🔐 <strong>Privacy First:</strong> Your message opens in your email app. 
            No data is collected, no third parties involved. You review before sending.
        </div>
    </div>

    <script>
        function sendMessage() {
            const message = document.getElementById('message').value.trim();
            if (!message) {
                alert("⚠️ Please write your note first!");
                document.getElementById('message').focus();
                return;
            }

            // 🔐 بريدك مشفر كمصفوفة أرقام - لا يظهر كنص في المصدر
            // worldday@mailo.com
            const emailCodes = [
                119,111,114,108,100,100,97,121,  // worldday
                64,                               // @
                109,97,105,108,111,46,99,111,109  // mailo.com
            ];
            
            // فك التشفير فقط عند النقر الفعلي
            const email = emailCodes.map(code => String.fromCharCode(code)).join('');
            
            // فتح بريد الزائر مع الرسالة
            const subject = "New Note from Your Website";
            const body = encodeURIComponent(message + "\n\n---\nSent via secure contact form");
            
            window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${body}`;
            
            // مسح الحقل
            document.getElementById('message').value = '';
        }

        // ✨ دعم Ctrl+Enter للإرسال السريع
        document.getElementById('message').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
